services:
  postgres:
    image: postgres:15
    container_name: adc_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: adc_clickhouse
    environment:
      CLICKHOUSE_DB: adc_signals
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse_init:/docker-entrypoint-initdb.d

  spark-master:
    image: apache/spark:3.5.1
    container_name: adc_spark_master
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "--host",
        "spark-master",
        "--port",
        "7077",
        "--webui-port",
        "8080"
      ]
    ports:
      - "7077:7077"
      - "8081:8080"

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: adc_spark_worker_1
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077"
      ]
    depends_on:
      - spark-master

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: adc_spark_worker_2
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077"
      ]
    depends_on:
      - spark-master

  spark-worker-3:
    image: apache/spark:3.5.1
    container_name: adc_spark_worker_3
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077"
      ]
    depends_on:
      - spark-master

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: adc_airflow_init
    depends_on:
      - postgres
      - clickhouse
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: adc_airflow_webserver
    depends_on:
      - airflow-init
      - postgres
      - clickhouse
      - spark-master
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: adc_airflow_scheduler
    depends_on:
      - airflow-init
      - postgres
      - clickhouse
      - spark-master
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./spark_jobs:/opt/airflow/spark_jobs
      - ./logs:/opt/airflow/logs
    command: scheduler

  grafana:
    image: grafana/grafana:11.2.0
    container_name: adc_grafana
    ports:
      - "3000:3000"
    depends_on:
      - clickhouse
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  clickhouse_data:
  grafana_data: